name: MySQL Service

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:
  repository_dispatch:
    types:
      - backend-updated

permissions:
  contents: read

env:
  MYSQL_HOST: 127.0.0.1
  MYSQL_PORT: 3306
  MYSQL_DATABASE: libertyfinance
  MYSQL_USER: libertyfinance
  MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
  MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
  MYSQL_DATADIR: /home/runner/mysql-data
  # 5 horas y 30 minutos.
  # GitHub-hosted runners tienen límite de duración de 6 horas.
  LIVE_SECONDS: 19800

jobs:
  mysql:
    name: Persistir y levantar MySQL con Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 355

    concurrency:
      group: mysql-persistent
      cancel-in-progress: false

    steps:
      # ── 1. Instalar MySQL Server y destruir AppArmor ─────────────────────
      - name: Instalar MySQL 8.0 y matar AppArmor
        run: |
          set -Eeuo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq mysql-server-8.0 apparmor-utils
          sudo systemctl stop mysql || true
          sudo systemctl disable mysql || true
          
          # Matamos AppArmor
          sudo aa-teardown || true
          sudo rm -f /etc/apparmor.d/usr.sbin.mysqld
          
          mysql --version

      # ── 2. Restaurar cache del ciclo anterior ────────────────────────────
      - name: Restaurar datadir desde cache
        uses: actions/cache@v4
        with:
          path: ${{ env.MYSQL_DATADIR }}
          key: mysql-datadir-${{ github.repository }}-latest
          restore-keys: |
            mysql-datadir-${{ github.repository }}-

      # ── 3. Validar datadir — inicializar si está ausente o corrupto ──────
      - name: Validar e inicializar datadir
        run: |
          set -Eeuo pipefail

          sudo chown -R runner:runner "${MYSQL_DATADIR}" 2>/dev/null || true

          if [ -f "${MYSQL_DATADIR}/mysql/user.ibd" ]; then
            echo "Datadir válido ($(du -sh "${MYSQL_DATADIR}" | cut -f1))."
            echo "NEEDS_INIT=false" >> "$GITHUB_ENV"
          else
            echo "Datadir inválido o vacío — reinicializando..."

            sudo rm -rf "${MYSQL_DATADIR}"
            mkdir -p "${MYSQL_DATADIR}"

            /usr/sbin/mysqld \
              --no-defaults \
              --initialize-insecure \
              --datadir="${MYSQL_DATADIR}"

            echo "Datadir inicializado: $(du -sh "${MYSQL_DATADIR}" | cut -f1)"
            echo "NEEDS_INIT=true" >> "$GITHUB_ENV"
          fi

      # ── 4. Arrancar MySQL apuntando al datadir persistido ────────────────
      - name: Arrancar MySQL
        run: |
          set -Eeuo pipefail

          /usr/sbin/mysqld \
            --no-defaults \
            --datadir="${MYSQL_DATADIR}" \
            --bind-address=127.0.0.1 \
            --port=${MYSQL_PORT} \
            --socket=/tmp/mysql.sock \
            --pid-file=/tmp/mysql.pid \
            --log-error=/tmp/mysql-error.log \
            --skip-networking=OFF \
            > /tmp/mysql-stdout.log 2>&1 &

          echo $! > /tmp/mysql.pid

          echo "Esperando que MySQL esté listo..."

          for i in {1..30}; do
            if mysqladmin ping \
                -h 127.0.0.1 -P "${MYSQL_PORT}" \
                -u root \
                --socket=/tmp/mysql.sock \
                --silent 2>/dev/null; then
              echo "MySQL listo en el intento $i."
              break
            fi

            if ! kill -0 "$(cat /tmp/mysql.pid 2>/dev/null)" 2>/dev/null; then
              echo "MySQL murió antes de arrancar:"
              cat /tmp/mysql-error.log || true
              exit 1
            fi

            echo "Intento $i/30..."
            sleep 3
          done

          mysql \
            -h 127.0.0.1 -P "${MYSQL_PORT}" \
            -u root \
            --socket=/tmp/mysql.sock \
            -e "SELECT VERSION();"

      # ── 5. Configurar credenciales (solo si el datadir es nuevo) ─────────
      - name: Configurar usuarios y DB
        if: env.NEEDS_INIT == 'true'
        run: |
          set -Eeuo pipefail

          mysql \
            -h 127.0.0.1 -P "${MYSQL_PORT}" \
            -u root \
            --socket=/tmp/mysql.sock \
            --connect-expired-password \
            <<SQL
          /* Alteramos el root de localhost que viene por defecto */
          ALTER USER 'root'@'localhost' IDENTIFIED BY '${MYSQL_ROOT_PASSWORD}';
          
          /* CREAMOS el root para 127.0.0.1 porque no existe de fábrica y le damos permisos */
          CREATE USER IF NOT EXISTS 'root'@'127.0.0.1' IDENTIFIED BY '${MYSQL_ROOT_PASSWORD}';
          GRANT ALL PRIVILEGES ON *.* TO 'root'@'127.0.0.1' WITH GRANT OPTION;
          
          CREATE DATABASE IF NOT EXISTS \`${MYSQL_DATABASE}\`
            CHARACTER SET utf8mb4
            COLLATE utf8mb4_unicode_ci;
            
          CREATE USER IF NOT EXISTS '${MYSQL_USER}'@'%'
            IDENTIFIED BY '${MYSQL_PASSWORD}';
            
          GRANT ALL PRIVILEGES ON \`${MYSQL_DATABASE}\`.* TO '${MYSQL_USER}'@'%';
          FLUSH PRIVILEGES;
          SQL

          echo "Credenciales configuradas."

      # ── 5b. Garantizar BD de aplicación (siempre, idempotente) ──────────
      #
      #  Este paso corre incluso cuando NEEDS_INIT=false, cubriendo el caso
      #  en que la DB fue eliminada en un ciclo anterior sin que el datadir
      #  se re-inicializara (ej. DROP DATABASE manual, caché desincronizado).
      # ────────────────────────────────────────────────────────────────────
      - name: Garantizar base de datos libertyfinance
        run: |
          set -Eeuo pipefail

          mysql \
            -h 127.0.0.1 -P "${MYSQL_PORT}" \
            -u root \
            --password="${MYSQL_ROOT_PASSWORD}" \
            <<SQL
          CREATE DATABASE IF NOT EXISTS \`libertyfinance\`
            CHARACTER SET utf8mb4
            COLLATE utf8mb4_unicode_ci;

          CREATE USER IF NOT EXISTS '${MYSQL_USER}'@'%'
            IDENTIFIED BY '${MYSQL_PASSWORD}';

          GRANT ALL PRIVILEGES ON \`libertyfinance\`.* TO '${MYSQL_USER}'@'%';
          FLUSH PRIVILEGES;
          SQL

          echo "Base de datos libertyfinance verificada/creada."

      # ── 6. Verificar conexión con credenciales reales ────────────────────
      - name: Verificar conexión
        run: |
          set -Eeuo pipefail

          mysql \
            -h 127.0.0.1 -P "${MYSQL_PORT}" \
            -u "${MYSQL_USER}" \
            --password="${MYSQL_PASSWORD}" \
            "${MYSQL_DATABASE}" \
            -e "SELECT NOW() AS 'Hora MySQL';
                SELECT table_name, table_rows
                FROM information_schema.tables
                WHERE table_schema = '${MYSQL_DATABASE}'
                ORDER BY table_name;"

      # ── 7. Instalar cloudflared ──────────────────────────────────────────
      - name: Instalar cloudflared
        run: |
          set -Eeuo pipefail
          set -x

          echo "Instalando cloudflared..."

          curl -L \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o cloudflared

          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared

          cloudflared --version

      # ── 8. Exponer MySQL con Cloudflare Tunnel ───────────────────────────
      - name: Exponer base de datos con Cloudflare Tunnel
        env:
          CLOUDFLARED_TOKEN: ${{ secrets.CLOUDFLARED_TOKEN }}
        run: |
          set -Eeuo pipefail
          set -x

          if [ -z "${CLOUDFLARED_TOKEN:-}" ]; then
            echo "Falta el secret CLOUDFLARED_TOKEN."
            exit 1
          fi

          rm -f cloudflared.log cloudflared.pid

          echo "Iniciando Cloudflare Tunnel..."
          cloudflared tunnel --no-autoupdate run --token "${CLOUDFLARED_TOKEN}" \
            > cloudflared.log 2>&1 &

          CLOUDFLARED_PID=$!
          echo "$CLOUDFLARED_PID" > cloudflared.pid

          echo "PID cloudflared: $CLOUDFLARED_PID"
          echo "Esperando que cloudflared conecte..."

          for i in {1..120}; do
            echo "----- Esperando Cloudflare Tunnel $i/120 -----"

            if ! ps -p "$CLOUDFLARED_PID" > /dev/null; then
              echo "cloudflared murió antes de conectar."
              cat cloudflared.log || true
              exit 1
            fi

            if grep -Ei "registered tunnel connection|connection.*registered|connected" cloudflared.log > /dev/null; then
              echo "cloudflared conectado exitosamente al edge de Cloudflare."
              break
            fi

            sleep 2
          done

      # ── 9. Mantener el servicio vivo ─────────────────────────────────────
      - name: Mantener procesos vivos
        run: |
          echo "MySQL corriendo en 127.0.0.1:${MYSQL_PORT}"
          echo "Base de datos : ${MYSQL_DATABASE}"
          echo "Usuario       : ${MYSQL_USER}"
          echo "Cloudflare Tunnel exponiendo el servicio."
          echo "Manteniendo la infraestructura viva durante ${LIVE_SECONDS} segundos..."
          sleep "${LIVE_SECONDS}"

      # ── 10. Apagar MySQL y Túnel limpiamente ─────────────────────────────
      - name: Apagar servicios limpiamente
        if: always()
        run: |
          set -Eeuo pipefail

          # Apagar cloudflared
          if [ -f cloudflared.pid ]; then
            echo "Apagando cloudflared..."
            kill "$(cat cloudflared.pid 2>/dev/null)" 2>/dev/null || true
          fi

          echo "Apagando MySQL para flush de páginas InnoDB al disco..."

          if [ ! -f /tmp/mysql.pid ]; then
            echo "MySQL no arrancó (no hay PID). Saltando apagado."
          else
            mysqladmin \
              -h 127.0.0.1 -P "${MYSQL_PORT}" \
              -u root \
              --password="${MYSQL_ROOT_PASSWORD}" \
              shutdown 2>/dev/null || \
            mysqladmin \
              -h 127.0.0.1 -P "${MYSQL_PORT}" \
              -u root \
              --socket=/tmp/mysql.sock \
              shutdown 2>/dev/null || true

            for i in {1..20}; do
              if ! kill -0 "$(cat /tmp/mysql.pid 2>/dev/null)" 2>/dev/null; then
                echo "MySQL apagado correctamente."
                break
              fi
              echo "Esperando shutdown $i/20..."
              sleep 2
            done

            kill -9 "$(cat /tmp/mysql.pid 2>/dev/null)" 2>/dev/null || true
          fi

          if [ -d "${MYSQL_DATADIR}" ]; then
            echo "Datadir final: $(du -sh "${MYSQL_DATADIR}" | cut -f1)"
          fi
