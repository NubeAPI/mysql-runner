name: MySQL Service

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:
  repository_dispatch:
    types:
      - backend-updated

permissions:
  contents: read

env:
  MYSQL_HOST: 127.0.0.1
  MYSQL_PORT: 3306
  MYSQL_DATABASE: nubeapi
  MYSQL_USER: nubeapi
  MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
  MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
  MYSQL_DATADIR: /home/runner/mysql-data

jobs:
  mysql:
    name: Persistir y levantar MySQL
    runs-on: ubuntu-latest
    timeout-minutes: 355

    concurrency:
      group: mysql-persistent
      cancel-in-progress: false

    steps:
      # ── 1. Instalar MySQL Server en el runner ────────────────────────────
      - name: Instalar MySQL 8.0
        run: |
          set -Eeuo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq mysql-server-8.0
          sudo systemctl stop mysql || true
          sudo systemctl disable mysql || true
          
          # DESACTIVAR APPARMOR PARA MYSQL
          # Vital para permitir que MySQL escriba fuera de /var/lib/mysql
          sudo aa-disable /usr/sbin/mysqld || true
          
          mysql --version

      # ── 2. Restaurar cache del ciclo anterior ────────────────────────────
      - name: Restaurar datadir desde cache
        uses: actions/cache@v4
        with:
          path: ${{ env.MYSQL_DATADIR }}
          key: mysql-datadir-${{ github.repository }}-latest
          restore-keys: |
            mysql-datadir-${{ github.repository }}-

      # ── 3. Validar datadir — inicializar si está ausente o corrupto ──────
      - name: Validar e inicializar datadir
        run: |
          set -Eeuo pipefail

          # Tomar ownership del directorio sin importar quién lo creó
          sudo chown -R runner:runner "${MYSQL_DATADIR}" 2>/dev/null || true

          # Un datadir válido siempre tiene mysql/user.ibd
          if [ -f "${MYSQL_DATADIR}/mysql/user.ibd" ]; then
            echo "Datadir válido ($(du -sh "${MYSQL_DATADIR}" | cut -f1))."
            echo "NEEDS_INIT=false" >> "$GITHUB_ENV"
          else
            echo "Datadir inválido o vacío — reinicializando..."

            # ELIMINAR el directorio. No lo creamos con mkdir.
            # Dejamos que mysqld lo cree desde cero.
            sudo rm -rf "${MYSQL_DATADIR}"

            sudo mysqld \
              --initialize-insecure \
              --user=runner \
              --datadir="${MYSQL_DATADIR}"

            echo "Datadir inicializado: $(du -sh "${MYSQL_DATADIR}" | cut -f1)"
            echo "NEEDS_INIT=true" >> "$GITHUB_ENV"
          fi

      # ── 4. Arrancar MySQL apuntando al datadir persistido ────────────────
      - name: Arrancar MySQL
        run: |
          set -Eeuo pipefail

          # Arrancamos mysqld con sudo para mantener coherencia de permisos
          sudo mysqld \
            --user=runner \
            --datadir="${MYSQL_DATADIR}" \
            --bind-address=127.0.0.1 \
            --port=${MYSQL_PORT} \
            --socket=/tmp/mysql.sock \
            --pid-file=/tmp/mysql.pid \
            --log-error=/tmp/mysql-error.log \
            --skip-networking=OFF \
            > /tmp/mysql-stdout.log 2>&1 &

          echo "Esperando que MySQL esté listo..."

          for i in {1..30}; do
            if mysqladmin ping \
                -h 127.0.0.1 -P "${MYSQL_PORT}" \
                -u root \
                --socket=/tmp/mysql.sock \
                --silent 2>/dev/null; then
              echo "MySQL listo en el intento $i."
              break
            fi

            # Validar de forma segura comprobando que el archivo PID exista primero
            if [ -f /tmp/mysql.pid ]; then
              if ! sudo kill -0 "$(sudo cat /tmp/mysql.pid)" 2>/dev/null; then
                echo "MySQL murió antes de arrancar:"
                cat /tmp/mysql-error.log || true
                exit 1
              fi
            fi

            echo "Intento $i/30..."
            sleep 3
          done

          mysql \
            -h 127.0.0.1 -P "${MYSQL_PORT}" \
            -u root \
            --socket=/tmp/mysql.sock \
            -e "SELECT VERSION();"

      # ── 5. Configurar credenciales (solo si el datadir es nuevo) ─────────
      - name: Configurar usuarios y DB
        if: env.NEEDS_INIT == 'true'
        run: |
          set -Eeuo pipefail

          mysql \
            -h 127.0.0.1 -P "${MYSQL_PORT}" \
            -u root \
            --socket=/tmp/mysql.sock \
            --connect-expired-password \
            <<SQL
          ALTER USER 'root'@'localhost' IDENTIFIED BY '${MYSQL_ROOT_PASSWORD}';
          ALTER USER 'root'@'127.0.0.1' IDENTIFIED BY '${MYSQL_ROOT_PASSWORD}';
          CREATE DATABASE IF NOT EXISTS \`${MYSQL_DATABASE}\`
            CHARACTER SET utf8mb4
            COLLATE utf8mb4_unicode_ci;
          CREATE USER IF NOT EXISTS '${MYSQL_USER}'@'%'
            IDENTIFIED BY '${MYSQL_PASSWORD}';
          GRANT ALL PRIVILEGES ON \`${MYSQL_DATABASE}\`.* TO '${MYSQL_USER}'@'%';
          FLUSH PRIVILEGES;
          SQL

          echo "Credenciales configuradas."

      # ── 6. Verificar conexión con credenciales reales ────────────────────
      - name: Verificar conexión
        run: |
          set -Eeuo pipefail

          mysql \
            -h 127.0.0.1 -P "${MYSQL_PORT}" \
            -u "${MYSQL_USER}" \
            --password="${MYSQL_PASSWORD}" \
            "${MYSQL_DATABASE}" \
            -e "SELECT NOW() AS 'Hora MySQL';
                SELECT table_name, table_rows
                FROM information_schema.tables
                WHERE table_schema = '${MYSQL_DATABASE}'
                ORDER BY table_name;"

      # ── 7. Aquí corre tu backend normalmente ─────────────────────────────
      - name: Placeholder — backend usando la DB
        run: |
          echo "MySQL corriendo en 127.0.0.1:${MYSQL_PORT}"
          echo "Base de datos : ${MYSQL_DATABASE}"
          echo "Usuario       : ${MYSQL_USER}"
          sleep 5

      # ── 8. Apagar MySQL limpiamente antes de guardar el cache ────────────
      - name: Apagar MySQL limpiamente
        if: always()
        run: |
          set -Eeuo pipefail

          echo "Apagando MySQL para flush de páginas InnoDB al disco..."

          mysqladmin \
            -h 127.0.0.1 -P "${MYSQL_PORT}" \
            -u root \
            --password="${MYSQL_ROOT_PASSWORD}" \
            shutdown 2>/dev/null || \
          mysqladmin \
            -h 127.0.0.1 -P "${MYSQL_PORT}" \
            -u root \
            --socket=/tmp/mysql.sock \
            shutdown 2>/dev/null || true

          for i in {1..20}; do
            if [ ! -f /tmp/mysql.pid ] || ! sudo kill -0 "$(sudo cat /tmp/mysql.pid 2>/dev/null)" 2>/dev/null; then
              echo "MySQL apagado correctamente."
              break
            fi
            echo "Esperando shutdown $i/20..."
            sleep 2
          done

          if [ -f /tmp/mysql.pid ]; then
            sudo kill "$(sudo cat /tmp/mysql.pid 2>/dev/null)" 2>/dev/null || true
          fi

          echo "Datadir final: $(sudo du -sh "${MYSQL_DATADIR}" | cut -f1)"
